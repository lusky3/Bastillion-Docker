services:
  bastillion:
    build: .
    ports:
      - "9080:8080"
    environment:
      - JAVA_OPTS=-Xmx512m
      # Tests drive the UI over plain HTTP; TLS is exercised in production images
      - TLS_ENABLED=false
      - PORT=8080
      - ONE_TIME_PASSWORD=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - test-network

  ssh-target:
    image: lscr.io/linuxserver/openssh-server:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - USER_NAME=testuser
      - USER_PASSWORD=testpass123
      - PASSWORD_ACCESS=true
    ports:
      - "2223:2222"
    networks:
      - test-network

networks:
  test-network:
    driver: bridge

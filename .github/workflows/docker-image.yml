name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  packages: write
  security-events: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Build Maven project
        run: ./patches/lift-system-cap.sh && mvn clean package -DskipTests
      
      - name: Build test image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: bastillion-test:latest
          cache-from: type=gha
      
      - name: Start test environment
        run: |
          docker compose -f docker-compose.test.yml up -d
          sleep 20
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      
      - name: Install test dependencies
        working-directory: tests
        run: npm ci
      
      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install chromium --with-deps
      
      - name: Run Playwright tests
        working-directory: tests
        run: npx playwright test --reporter=list
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          path: tests/test-results/
          retention-days: 7
      
      - name: Stop test environment
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  build-and-push:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: ./patches/lift-system-cap.sh && mvn --batch-mode --update-snapshots clean package -DskipTests

    - name: Upload jar artifact
      uses: actions/upload-artifact@v7
      with:
        name: bastillion-jar
        path: target/bastillion-*.jar
        retention-days: 7

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GitHub Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_KEY }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: |
          ghcr.io/lusky3/bastillion
          lusky3/bastillion
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
        annotations: |
          org.opencontainers.image.title=Bastillion
          org.opencontainers.image.description=Web-based SSH console that centrally manages administrative access to systems with key management and two-factor authentication
          org.opencontainers.image.url=https://www.bastillion.io
          org.opencontainers.image.source=https://github.com/lusky3/Bastillion-Docker
          org.opencontainers.image.licenses=Prosperity-3.0.0

    - name: Build Docker image for scanning
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64
        load: true
        tags: lusky3/bastillion:scan
        cache-from: type=gha

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.36.0
      with:
        image-ref: lusky3/bastillion:scan
        format: sarif
        output: trivy-results.sarif

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: trivy-results.sarif
        category: trivy

    - name: Run Grype vulnerability scanner
      id: grype
      uses: anchore/scan-action@v7
      with:
        image: lusky3/bastillion:scan
        fail-build: false
        severity-cutoff: high
        output-format: sarif

    - name: Upload Grype results to GitHub Security
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: ${{ steps.grype.outputs.sarif }}
        category: grype

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        sbom: true
        provenance: true

    - name: Maven Dependency Tree Dependency Submission
      if: github.event_name != 'pull_request'
      uses: advanced-security/maven-dependency-submission-action@v5.0.0

    - name: Discord notification
      if: always()
      uses: sarisia/actions-status-discord@v1
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        status: ${{ job.status }}
        title: ${{ github.event_name == 'pull_request' && 'Pull Request' || 'Build' }}
        description: ${{ github.event_name == 'pull_request' && github.event.pull_request.title || github.event.head_commit.message }}
        username: GitHub Actions

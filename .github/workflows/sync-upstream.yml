name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/bastillion-io/Bastillion.git || true
          git fetch upstream
      
      - name: Check for updates
        id: check
        run: |
          # Check if there are commits in upstream/main that aren't in main
          # This accounts for diverged histories and cherry-picks
          COMMITS_TO_MERGE=$(git rev-list --count HEAD..upstream/main)
          
          if [ "$COMMITS_TO_MERGE" -eq 0 ]; then
            echo "No new commits to merge from upstream"
            echo "has_updates=false" >> $GITHUB_OUTPUT
          else
            echo "Found $COMMITS_TO_MERGE commits to merge from upstream"
            LATEST_UPSTREAM=$(git rev-parse upstream/main)
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "upstream_sha=${LATEST_UPSTREAM:0:7}" >> $GITHUB_OUTPUT
            echo "commits_count=$COMMITS_TO_MERGE" >> $GITHUB_OUTPUT
          fi
      
      - name: Create sync branch
        if: steps.check.outputs.has_updates == 'true'
        run: |
          BRANCH_NAME="sync-upstream-${{ steps.check.outputs.upstream_sha }}"
          git checkout -b "$BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_ENV
      
      - name: Merge upstream changes
        if: steps.check.outputs.has_updates == 'true'
        id: merge
        run: |
          # Merge with strategy to keep our workflows
          if git merge upstream/main --no-edit -X ours; then
            # Restore our workflows (keep ours, not upstream's)
            git checkout HEAD -- .github/workflows/
            
            # Check if merge created any commits
            COMMITS_AHEAD=$(git rev-list --count origin/main..HEAD)
            if [ "$COMMITS_AHEAD" -gt 0 ]; then
              # Amend the merge commit to include workflow exclusion
              git commit --amend --no-edit
              echo "merge_status=success" >> $GITHUB_OUTPUT
              echo "has_conflicts=false" >> $GITHUB_OUTPUT
              echo "has_commits=true" >> $GITHUB_OUTPUT
            else
              echo "merge_status=no_changes" >> $GITHUB_OUTPUT
              echo "has_conflicts=false" >> $GITHUB_OUTPUT
              echo "has_commits=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "merge_status=conflict" >> $GITHUB_OUTPUT
            echo "has_conflicts=true" >> $GITHUB_OUTPUT
            echo "has_commits=false" >> $GITHUB_OUTPUT
            git merge --abort
          fi
      
      - name: Push sync branch
        if: steps.check.outputs.has_updates == 'true' && steps.merge.outputs.has_commits == 'true'
        run: |
          git push origin "${{ env.branch_name }}"
      
      - name: Create Pull Request
        if: steps.check.outputs.has_updates == 'true' && steps.merge.outputs.has_commits == 'true'
        id: create_pr
        uses: actions/github-script@v9
        env:
          UPSTREAM_SHA: ${{ steps.check.outputs.upstream_sha }}
          MERGE_STATUS: ${{ steps.merge.outputs.merge_status }}
          HAS_CONFLICTS: ${{ steps.merge.outputs.has_conflicts }}
        with:
          script: |
            const hasConflicts = process.env.HAS_CONFLICTS === 'true';
            const statusMessage = hasConflicts 
              ? '⚠️ **Manual merge required** - conflicts detected'
              : '✅ Clean merge - will auto-merge after tests pass';
            
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Sync upstream changes (${process.env.UPSTREAM_SHA})`,
              head: '${{ env.branch_name }}',
              base: 'main',
              body: `## Upstream Sync
              
              This PR syncs changes from [bastillion-io/Bastillion](https://github.com/bastillion-io/Bastillion).
              
              **Upstream commit:** ${process.env.UPSTREAM_SHA}
              **Merge status:** ${process.env.MERGE_STATUS}
              **Has conflicts:** ${process.env.HAS_CONFLICTS}
              
              ${statusMessage}
              `
            });
            return pr.number;
      
      - name: Enable auto-merge
        if: steps.check.outputs.has_updates == 'true' && steps.merge.outputs.has_commits == 'true' && steps.merge.outputs.has_conflicts == 'false'
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = ${{ steps.create_pr.outputs.result }};
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              merge_method: 'merge'
            });

      - name: Trigger image build for the merged sync
        # The merge above uses GITHUB_TOKEN, so its push does NOT trigger the
        # `push`-based Build and Push Docker Image workflow (GitHub suppresses
        # recursive GITHUB_TOKEN runs). Dispatch it explicitly so the published
        # image actually picks up the synced upstream changes. workflow_dispatch
        # is exempt from that suppression, so this run does fire.
        if: steps.check.outputs.has_updates == 'true' && steps.merge.outputs.has_commits == 'true' && steps.merge.outputs.has_conflicts == 'false'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docker-image.yml',
              ref: 'main',
            });
